<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Médicos</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    h1 {
      margin: 0;
      color: #2e7d32;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #2e7d32;
      color: white;
    }

    .btn-secondary {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #c62828;
      color: white;
    }

    .mensagem {
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }

    .sucesso {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .erro {
      background: #fdecea;
      color: #b71c1c;
    }

    .lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 6px;
      padding: 15px;
      border-left: 5px solid #2e7d32;
    }

    .card.desativado {
      border-left-color: #c62828;
      background: #fff5f5;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .status {
      font-size: 12px;
      font-weight: bold;
      color: #c62828;
    }

    .acoes {
      margin-top: 12px;
    }

    .acoes button {
      margin-right: 5px;
    }

    footer {
      margin-top: 50px;
      padding-top: 10px;
      border-top: 1px solid #ccc;
      font-size: 12px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Gerenciador de Médicos</h1>
  <button class="btn-primary" onclick="irParaFormulario()">Incluir novo médico</button>
</header>

<div id="mensagem" class="mensagem"></div>

<div id="lista" class="lista"></div>

<footer>
  Jefferson Silva Geronimo / Renata Rodrigues da Silva / TADS 3B Noturno / 2026<br>
  Usou IA: SIM — Apoio na organização, revisão e explicação do código.
</footer>

<script>
  const API = "/medicos";

  function mostrarMensagem(texto, tipo) {
    const div = document.getElementById("mensagem");
    div.className = "mensagem " + tipo;
    div.textContent = texto;
    div.style.display = "block";
    setTimeout(() => div.style.display = "none", 3000);
  }

  function carregarMedicos() {
    fetch(API)
      .then(res => res.json())
      .then(dados => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (dados.length === 0) {
          lista.innerHTML = "<p>Nenhum médico cadastrado.</p>";
          return;
        }

        dados.forEach(m => {
          const card = document.createElement("div");
          card.className = "card" + (m.cadastroAtivo ? "" : " desativado");

          card.innerHTML = `
            <h3>${m.nome}</h3>
            <div>CRM: ${m.crm}</div>
            <div>Especialidade: ${m.especialidade}</div>
            ${m.cadastroAtivo ? "" : "<div class='status'>DESATIVADO</div>"}
            <div class="acoes">
              <button class="btn-secondary" onclick="editar(${m.id})">Alterar</button>
              <button class="btn-danger" onclick="excluir(${m.id})">Excluir</button>
            </div>
          `;

          lista.appendChild(card);
        });
      });
  }

  function irParaFormulario() {
    location.href = "/formulario.html";
  }

  function editar(id) {
    location.href = `/formulario.html?id=${id}`;
  }

  function excluir(id) {
    if (!confirm("Deseja realmente excluir este médico?")) return;

    fetch(`${API}/${id}`, { method: "DELETE" })
      .then(() => {
        mostrarMensagem("Médico excluído com sucesso.", "sucesso");
        carregarMedicos();
      });
  }

  carregarMedicos();
</script>

</body>
</html>
