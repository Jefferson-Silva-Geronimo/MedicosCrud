<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Médico</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
    }

    h1 {
      color: #2e7d32;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .acoes {
      margin-top: 20px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #2e7d32;
      color: white;
    }

    .btn-secondary {
      background: #e0e0e0;
    }

    .mensagem {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }

    .erro {
      background: #fdecea;
      color: #b71c1c;
    }

    footer {
      margin-top: 40px;
      padding-top: 10px;
      border-top: 1px solid #ccc;
      font-size: 12px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

<h1 id="titulo">Incluir novo médico</h1>

<form id="form">
  <label>Nome</label>
  <input id="nome" required>

  <label>CRM</label>
  <input id="crm" required>

  <label>Especialidade</label>
  <input id="especialidade" required>

  <label>Observações</label>
  <textarea id="observacoes"></textarea>

  <label>Cadastro ativado</label>
  <select id="cadastroAtivo" required>
    <option value="">Selecione</option>
    <option value="true">Sim</option>
    <option value="false">Não</option>
  </select>

  <div class="acoes">
    <button class="btn-primary" type="submit">Salvar</button>
    <button class="btn-secondary" type="button" onclick="voltar()">Cancelar</button>
  </div>

  <div id="mensagem" class="mensagem erro"></div>
</form>

<footer>
  Jefferson Silva Geronimo / Renata Rodrigues da Silva / TADS 3B Noturno / 2026<br>
  Usou IA: SIM — Apoio na organização, revisão e explicação do código.
</footer>

<script>
  const API = "/medicos";
  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  if (id) {
    document.getElementById("titulo").innerText = "Alterar médico";

    fetch(`${API}/${id}`)
      .then(res => res.json())
      .then(m => {
        nome.value = m.nome;
        crm.value = m.crm;
        especialidade.value = m.especialidade;
        observacoes.value = m.observacoes;
        cadastroAtivo.value = m.cadastroAtivo.toString();
      });
  }

  document.getElementById("form").onsubmit = e => {
    e.preventDefault();

    const medico = {
      nome: nome.value,
      crm: crm.value,
      especialidade: especialidade.value,
      observacoes: observacoes.value,
      cadastroAtivo: cadastroAtivo.value === "true"
    };

    fetch(id ? `${API}/${id}` : API, {
      method: id ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(medico)
    })
    .then(res => {
      if (!res.ok) return res.json().then(err => Promise.reject(err));
      alert(id ? "Médico atualizado com sucesso!" : "Médico cadastrado com sucesso!");
      location.href = "/";
    })
    .catch(err => {
      const div = document.getElementById("mensagem");
      div.innerHTML = err.join("<br>");
      div.style.display = "block";
    });
  };

  function voltar() {
    location.href = "/";
  }
</script>

</body>
</html>
